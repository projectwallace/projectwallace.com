onlyBuiltDependencies:
  - esbuild
  - sharp

overrides:
  # Pinned versions to make sure we always only bundle 1 version of each
  '@projectwallace/css-analyzer': $@projectwallace/css-analyzer
  '@projectwallace/css-parser': $@projectwallace/css-parser
  '@projectwallace/format-css': $@projectwallace/format-css
  color-sorter: $color-sorter
  # Security-based pinned versions
  esbuild@>=0.17.0 <0.28.1: '>=0.28.1'
  runed: $runed
  sharp: 0.34.3
  vite: $vite
  vite@>=8.0.0 <=8.0.15: '>=8.0.16'

settings:
  blockExoticSubdeps: true
  minimumReleaseAge: 10080
  minimumReleaseAgeExclude:
    - '@projectwallace/*'
  trustPolicy: no-downgrade
