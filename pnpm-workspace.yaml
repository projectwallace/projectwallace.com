settings:
  # Block dependencies from using non-registry sources (git repos, tarballs)
  blockExoticSubdeps: true

  # Wait 1 week before allowing newly published packages to be installed,
  # except for first-party packages you own
  minimumReleaseAge: 10080
  minimumReleaseAgeExclude:
    - '@projectwallace/*'

  # Prevent trust level downgrades compared to previously installed packages
  trustPolicy: no-downgrade

overrides:
  '@projectwallace/css-analyzer': '$@projectwallace/css-analyzer'
  '@projectwallace/css-parser': '$@projectwallace/css-parser'
  '@projectwallace/format-css': '$@projectwallace/format-css'
  color-sorter: '$color-sorter'
  runed: '$runed'
  sharp: '0.34.3'
  vite: '$vite'

onlyBuiltDependencies:
  - esbuild
  - sharp
